name: traderos
description: "TraderOS Gold Edition — XAU/USD trader app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Storage
  sqflite: ^2.4.1
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # i18n
  intl: any

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.16
  url_launcher: ^6.3.1

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  equatable: ^2.0.7
  logger: ^2.5.0
  youtube_player_flutter: ^10.0.1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/altyn_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#C9A227"
  adaptive_icon_foreground: "assets/icon/altyn_icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icon/
